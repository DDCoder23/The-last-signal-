version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    
      ignore:
        - dependency-name: "numpy"
        - dependency-name: "PySide6"
        - dependency-name: "vispy"
