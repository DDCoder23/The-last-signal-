name: Integration Tests

on:
  push:
    branches:
      - main

  pull_request:

  workflow_dispatch:
  workflow_call:

  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

jobs:

  integration:

    name: Python ↔ Rust Integration

    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:

    ##########################################################
    # Checkout
    ##########################################################

    - name: Checkout repository
      uses: actions/checkout@v4

    ##########################################################
    # Python
    ##########################################################

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
        cache: "pip"

    - name: Install Python dependencies
      run: |

        python -m pip install --upgrade pip

        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

        pip install pytest

    ##########################################################
    # Rust
    ##########################################################

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    ##########################################################
    # Build server
    ##########################################################

    - name: Build Rust server
      working-directory: server_rust
      run: cargo build --release

    ##########################################################
    # Start server
    ##########################################################

    - name: Start Rust server
      working-directory: server_rust
      run: |

        cargo run --release > server.log 2>&1 &

        echo $! > server.pid

        sleep 5

    ##########################################################
    # Vérifie que le serveur est lancé
    ##########################################################

    - name: Check server
      run: |

        if ps -p $(cat server_rust/server.pid) > /dev/null
        then
          echo "Server running"
        else
          echo "Server crashed"

          cat server_rust/server.log

          exit 1
        fi

    ##########################################################
    # Tests Python
    ##########################################################

    - name: Run integration tests
      run: |

        pytest tests/ -v -s
        pytest tests/ -v -s

    ##########################################################
    # Stop server
    ##########################################################

    - name: Stop server
      if: always()
      run: |

        kill $(cat server_rust/server.pid) || true

    ##########################################################
    # Upload log
    ##########################################################
    - name: Check generated files
      run: |
             echo "=== DATABASE ==="
             ls -lah database
             echo "=== LOG FILE ==="
             ls -lah logs
             stat logs/the_last_signal.log
             tail -20 logs/the_last_signal.log

             
    - name: Upload server log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: server-log
        path: server_rust/server.log
  # ==========================================================
# Commit automatique des bases SQLite
# ========================================================
    - name: Commit databases and logs
      if: always()
      run: |
             git config --global user.name "github-actions"
             git config --global user.email "github-actions@github.com"

             echo "=== Backup generated files ==="

             mkdir -p /tmp/artifacts-backup
             mkdir -p /tmp/artifacts-backup/database
             mkdir -p /tmp/artifacts-backup/logs

             cp -a database/. /tmp/artifacts-backup/database/ 2>/dev/null || true
             cp -a logs/. /tmp/artifacts-backup/logs/ 2>/dev/null || true
             echo "=== Backup content ==="
             find /tmp/artifacts-backup -type f


             git reset --hard
             git clean -fd
             echo "=== Checkout ci-database branch ==="

             git fetch origin

             if git show-ref --verify --quiet refs/remotes/origin/ci-database; then

             git checkout ci-database
             git pull --ff-only origin ci-database

             else

             git checkout --orphan ci-database
             git rm -rf . || true

             fi


             echo "=== Restore generated files ==="

             mkdir -p database
             mkdir -p logs

             cp -a /tmp/artifacts-backup/database/. database/ 2>/dev/null || true
             cp -a /tmp/artifacts-backup/logs/. logs/ 2>/dev/null || true
             echo "=== Current artifacts ==="

             find database logs -type f

             echo "=== Detect changes ==="

             git add database/*.db logs

             git diff --cached --name-status


             echo "=== Commit if needed ==="

             if ! git diff --cached --quiet; then

             git commit \
             -m "Update CI artifacts #${GITHUB_RUN_NUMBER}"

             git push origin ci-database

             else

             echo "No database or log changes detected."

             fi
