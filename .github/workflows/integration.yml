name: Integration Tests

on:
  push:
    branches:
      - main

  pull_request:

  workflow_dispatch:
  workflow_call:

  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

jobs:

  integration:

    name: Python ↔ Rust Integration

    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:

    ##########################################################
    # Checkout
    ##########################################################

    - name: Checkout repository
      uses: actions/checkout@v4

    ##########################################################
    # Python
    ##########################################################

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
        cache: "pip"

    - name: Install Python dependencies
      run: |

        python -m pip install --upgrade pip

        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

        pip install pytest

    ##########################################################
    # Rust
    ##########################################################

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    ##########################################################
    # Build server
    ##########################################################

    - name: Build Rust server
      working-directory: server_rust
      run: cargo build --release

    ##########################################################
    # Start server
    ##########################################################

    - name: Start Rust server
      working-directory: server_rust
      run: |

        cargo run --release > server.log 2>&1 &

        echo $! > server.pid

        sleep 5

    ##########################################################
    # Vérifie que le serveur est lancé
    ##########################################################

    - name: Check server
      run: |

        if ps -p $(cat server_rust/server.pid) > /dev/null
        then
          echo "Server running"
        else
          echo "Server crashed"

          cat server_rust/server.log

          exit 1
        fi

    ##########################################################
    # Tests Python
    ##########################################################

    - name: Run integration tests
      run: |

        pytest tests/ -v

    ##########################################################
    # Stop server
    ##########################################################

    - name: Stop server
      if: always()
      run: |

        kill $(cat server_rust/server.pid) || true

    ##########################################################
    # Upload log
    ##########################################################
    - name: Check generated files
      run: |
             echo "=== DATABASE ==="
             ls -lah database

             
    - name: Upload server log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: server-log
        path: server_rust/server.log
  # ==========================================================
# Commit automatique des bases SQLite
# ==========================================================

    - name: Commit SQLite databases
      if: always()
      run: |
              git config --global user.name "github-actions"
              git config --global user.email "github-actions@github.com"
              mkdir -p /tmp/db-backup
              cp -r database /tmp/db-backup/ || true
      
              git reset --hard
              git clean -fd
              git fetch origin
              if git show-ref --verify --quiet refs/remotes/origin/ci-database; then
              git checkout ci-database
              git pull origin ci-database
              else
              git checkout --orphan ci-database
              git rm -rf .
              fi

              mkdir -p database
              


              git add database

              git commit -m "SQLite Database #${GITHUB_RUN_NUMBER}" || echo "Nothing to commit"

              git push origin ci-database
            

    - name: Synchronize log files
      if: always()
      run: |
             git config --global user.name "github-actions"
             git config --global user.email "github-actions@github.com"

             # Sauvegarde des logs générés pendant le workflow
             mkdir -p /tmp/logs-backup
             cp -a logs/. /tmp/logs-backup/ 2>/dev/null || true
             git reset --hard
             git clean -fd

             git fetch origin

             if git show-ref --verify --quiet refs/remotes/origin/ci-database; then
               git checkout ci-database
               git pull --ff-only origin ci-database
             else
               git checkout --orphan ci-database
               git rm -rf . || true
             fi

             # Synchronisation complète du dossier logs
             rm -rf logs
             mkdir -p logs

             cp -a /tmp/logs-backup/. logs/ 2>/dev/null || true

             # Ajout des nouveaux fichiers et suppression des anciens
             git add -A logs

             if ! git diff --cached --quiet; then
             git commit -m "Update logs #${GITHUB_RUN_NUMBER}"
             git push origin ci-database
             else
             echo "Logs are already up to date."
             fi
    
