name: Commit Reports

on:
  workflow_call:
    inputs:
      artifact-name:
        description: Nom de l'artifact à télécharger
        required: true
        type: string

      report-type:
        description: Type de rapport (python, rust, security...)
        required: true
        type: string

      commit-message:
        description: Message du commit
        required: true
        type: string

      branch:
        description: Branche des rapports
        required: false
        default: ci-reports
        type: string

jobs:
  commit:
    name: Commit Reports

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: artifact

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Checkout reports branch
        run: |

          git fetch origin

          if git ls-remote --exit-code --heads origin "${{ inputs.branch }}" >/dev/null
          then
            git checkout "${{ inputs.branch }}"
            git pull origin "${{ inputs.branch }}"
          else
            git checkout --orphan "${{ inputs.branch }}"
            git rm -rf . || true
          fi

      - name: Create folders
        run: |

          mkdir -p reports/${{ inputs.report-type }}
          mkdir -p database/${{ inputs.report-type }}
          mkdir -p dashboard/${{ inputs.report-type }}

      - name: Copy reports
        run: |

          if [ -d artifact/reports ]; then
            cp -r artifact/reports/. reports/${{ inputs.report-type }}/
          fi

          if [ -d artifact/database ]; then
            cp -r artifact/database/. database/${{ inputs.report-type }}/
          fi

          if [ -d artifact/dashboard ]; then
            cp -r artifact/dashboard/. dashboard/${{ inputs.report-type }}/
          fi

      - name: Generate README
        run: |

          echo "# The Last Signal - CI Reports" > README.md
          echo "" >> README.md
          echo "Dernière mise à jour : $(date -u)" >> README.md
          echo "" >> README.md

          echo "## Rapports disponibles" >> README.md
          echo "" >> README.md

          for dir in reports/*; do
            if [ -d "$dir" ]; then
              echo "- $(basename "$dir")" >> README.md
            fi
          done

      - name: Commit
        run: |

          git add reports database dashboard README.md

          git commit -m "${{ inputs.commit-message }}" || echo "Nothing to commit"

      - name: Push
        run: |

          git push origin "${{ inputs.branch }}"       
