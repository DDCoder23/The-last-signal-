name: Python CI Report

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - "**"

  workflow_dispatch:

  schedule:
    # Toutes les heures
    - cron: "7 * * * *"

permissions:
  contents: write

jobs:

  python-check:

    name: Python Tests & Report
    runs-on: ubuntu-latest


    steps:
      # R├йcup├йration du code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
              fetch-depth: 0
              token: ${{ secrets.GITHUB_TOKEN }}
              persist-credentials: true


      # Installation Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"


      # Installation des outils
      - name: Install dependencies
        run: |

          python -m pip install --upgrade pip

          pip install pytest black flake8 radon pylint bandit pytest-cov interrogate


          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi



      # Cr├йation du fichier rapport
      - name: Create report
        run: |
          mkdir -p reports
          REPORT="reports/python-report-${GITHUB_RUN_NUMBER}.md"

          echo "REPORT=$REPORT" >> $GITHUB_ENV

          {
            echo "# ЁЯРН Python CI Report"
            echo ""
            echo "Run : ${GITHUB_RUN_NUMBER}"
            echo "Branch : ${GITHUB_REF_NAME}"
            echo "Commit : ${GITHUB_SHA}"
            echo "Date : $(date)"
            echo ""
            echo "---"
            echo ""
            echo "# ЁЯУК Summary"
            echo ""
            } > "$REPORT"

          

          

          



      # V├йrification du formatage
      - name: Check formatting
        continue-on-error: true
        run: |

                 echo "## тЪл Black" >> "$REPORT"

                 black --check . > black.txt 2>&1 || true

                 COUNT=$(grep -c "would reformat" black.txt)

                 echo "" >> "$REPORT"
                 echo "**Files to reformat:** $COUNT" >> "$REPORT"
                 echo "" >> "$REPORT"

                 echo "<details>" >> "$REPORT"
                 echo "<summary>Show files</summary>" >> "$REPORT"

                 grep "would reformat" black.txt \
                 | sed 's/would reformat //' \
                 >> "$REPORT"

                 echo "</details>" >> "$REPORT"



      # Analyse du code
      - name: Code analysis
        continue-on-error: true
        run: |

          echo "## Flake8" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "### ЁЯУК Erreurs par code" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "| Code | Nombre |" >> "$REPORT"
          echo "|------|-------:|" >> "$REPORT"

          awk -F: '{gsub(/^ +/, "", $4); print $4}' flake8.txt \
          | awk '{print $1}' \
          | sort \
          | uniq -c \
          | sort -rn \
          | while read count code
          do
             echo "| $code | $count |"
          done >> "$REPORT"
          echo "" >> "$REPORT"
        
          echo "" >> "$REPORT"
          echo "<details>" >> "$REPORT"
          echo "<summary>ЁЯУЛ Voir toutes les erreurs Flake8</summary>" >> "$REPORT"
          echo "" >> "$REPORT"

          echo "| Fichier | Ligne | Code | Message |" >> "$REPORT"
          echo "|---------|------:|------|---------|" >> "$REPORT"

          awk -F: '
          {
           file=$1
           line=$2

           gsub(/^ +/, "", $4)
           split($4,a," ")

           code=a[1]
           msg=$4
           sub(code" ","",msg)

          printf("| %s | %s | %s | %s |\n",
             file,
             line,
             code,
             msg)
           }
           ' flake8.txt >> "$REPORT"

          echo "" >> "$REPORT"
          echo "</details>" >> "$REPORT"
          echo "### ЁЯУВ Top 10 des fichiers avec le plus d'erreurs" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "| Rang | Fichier | Erreurs |" >> "$REPORT"
          echo "|----:|---------|--------:|" >> "$REPORT"

          awk -F: '{print $1}' flake8.txt \
          | sort | uniq -c | sort -rn \
          | head -10 | awk '{
          printf("| %d | %s | %d |\n", NR, $2, $1)
          }' >> "$REPORT"


      - name: Quality analysis
        continue-on-error: true
        run: |

          echo "## Quality Analysis" >> "$REPORT"

          echo "### Complexity" >> "$REPORT"
          radon cc . -a >> "$REPORT"


          echo "### Security" >> "$REPORT"
          bandit -r . >> "$REPORT"


          echo "### Pylint" >> "$REPORT"
          pylint . >> "$REPORT"


          echo "### Coverage" >> "$REPORT"
          pytest --cov . >> "$REPORT"


      # Tests
      - name: Run tests
        continue-on-error: true
        run: |

          echo "## Tests Pytest" >> "$REPORT"


          if [ -d tests ]; then

            pytest >> "$REPORT" 2>&1

          else

            echo "Aucun dossier tests trouv├й" >> "$REPORT"

          fi
      

      




      - name: Generate dashboard
        run: |
          mkdir -p dashboard
          python -m scripts.generate_dashboard
      # Affichage GitHub

      - name: Display report

        run: |

          cat "$REPORT" >> $GITHUB_STEP_SUMMARY



      


      # Sauvegarde artifact

      - name: Upload report

        uses: actions/upload-artifact@v4

        with:

          name: python-report

          path: |
             reports/**
             database/**
             dashboard/**
      - name: Commit reports
        uses: ./.github/actions/commit-reports
        with:
           report-type: python
           commit-message: "Python CI Report #${{ github.run_number }}"
