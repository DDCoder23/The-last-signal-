name: Python CI Report

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - "**"

  workflow_dispatch:

  schedule:
    # Toutes les heures
    - cron: "7 * * * *"

permissions:
  contents: write

jobs:

  python-check:

    name: Python Tests & Report
    runs-on: ubuntu-latest


    steps:
      # Récupération du code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
              fetch-depth: 0
              token: ${{ secrets.GITHUB_TOKEN }}
              persist-credentials: true


      # Installation Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"


      # Installation des outils
      - name: Install dependencies
        run: |

          python -m pip install --upgrade pip

          pip install pytest black flake8 radon pylint bandit pytest-cov interrogate


          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi



      # Création du fichier rapport
      - name: Create report
        run: |
          mkdir -p reports
          REPORT="reports/python-report-${GITHUB_RUN_NUMBER}.md"

          echo "REPORT=$REPORT" >> $GITHUB_ENV

          {
            echo "# 🐍 Python CI Report"
            echo ""
            echo "Run : ${GITHUB_RUN_NUMBER}"
            echo "Branch : ${GITHUB_REF_NAME}"
            echo "Commit : ${GITHUB_SHA}"
            echo "Date : $(date)"
            echo ""
            echo "---"
            echo ""
            echo "# 📊 Summary"
            echo ""
            } > "$REPORT"

          

          

          



      # Vérification du formatage
      - name: Check formatting
        continue-on-error: true
        run: |

                 echo "## ⚫ Black" >> "$REPORT"

                 black --check . > black.txt 2>&1 || true

                 COUNT=$(grep -c "would reformat" black.txt)

                 echo "" >> "$REPORT"
                 echo "**Files to reformat:** $COUNT" >> "$REPORT"
                 echo "" >> "$REPORT"

                 echo "<details>" >> "$REPORT"
                 echo "<summary>Show files</summary>" >> "$REPORT"

                 grep "would reformat" black.txt \
                 | sed 's/would reformat //' \
                 >> "$REPORT"

                 echo "</details>" >> "$REPORT"



      # Analyse du code
      - name: Code analysis
        continue-on-error: true
        run: |

          echo "##  Flake8" >> "$REPORT"
          echo "" >> "$REPORT"
          flake8 . > flake8.txt 2>&1 || true
          echo "### 📊 Erreurs par code" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "| Code | Nombre |" >> "$REPORT"
          echo "|------|-------:|" >> "$REPORT"

          awk -F: '{gsub(/^ +/, "", $4); print $4}' flake8.txt \
          | awk '{print $1}' \
          | sort \
          | uniq -c \
          | sort -rn \
          | while read count code
          do
             echo "| $code | $count |"
          done >> "$REPORT"
          echo "" >> "$REPORT"
        
          echo "" >> "$REPORT"
          echo "<details>" >> "$REPORT"
          echo "<summary>📋 Voir toutes les erreurs Flake8</summary>" >> "$REPORT"
          echo "" >> "$REPORT"

          echo "| Fichier | Ligne | Code | Message |" >> "$REPORT"
          echo "|---------|------:|------|---------|" >> "$REPORT"

          awk -F: '
          {
           file=$1
           line=$2

           gsub(/^ +/, "", $4)
           split($4,a," ")

           code=a[1]
           msg=$4
           sub(code" ","",msg)

          printf("| %s | %s | %s | %s |\n",
             file,
             line,
             code,
             msg)
           }
           ' flake8.txt >> "$REPORT"

          echo "" >> "$REPORT"
          echo "</details>" >> "$REPORT"
          echo "###  📂 Top 10 des fichiers avec le plus d'erreurs" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "| Rang | Fichier | Erreurs |" >> "$REPORT"
          echo "|----:|---------|--------:|" >> "$REPORT"

          awk -F: '{print $1}' flake8.txt \
          | sort | uniq -c | sort -rn \
          | head -10 | awk '{
          printf("| %d | %s | %d |\n", NR, $2, $1)
          }' >> "$REPORT"


      - name: Quality analysis
        continue-on-error: true
        run: |

              echo "## 🧠 Complexity (Radon)" >> "$REPORT"
              radon cc . -a > radon.txt 2>&1 || true

              AVG=$(grep "Average complexity" radon.txt | awk -F: '{print $2}')

              echo "" >> "$REPORT"
              echo "**Average complexity:** ${AVG:-Unknown}" >> "$REPORT"
              echo "" >> "$REPORT"

              echo "<details>" >> "$REPORT"
              echo "<summary>Show complexity report</summary>" >> "$REPORT"
              echo "" >> "$REPORT"

              cat radon.txt >> "$REPORT"

              echo "" >> "$REPORT"
              echo "</details>" >> "$REPORT"
              echo "" >> "$REPORT"
              echo "## 🔒 Security (Bandit)" >> "$REPORT"

              bandit -r . -f txt > bandit.txt 2>&1 || true

              HIGH=$(grep -c "Severity: High" bandit.txt || true)
              MEDIUM=$(grep -c "Severity: Medium" bandit.txt || true)
              LOW=$(grep -c "Severity: Low" bandit.txt || true)

              echo "" >> "$REPORT"
              echo "| Severity | Count |" >> "$REPORT"
              echo "|----------|------:|" >> "$REPORT"
              echo "| High | $HIGH |" >> "$REPORT"
              echo "| Medium | $MEDIUM |" >> "$REPORT"
              echo "| Low | $LOW |" >> "$REPORT"

              echo "" >> "$REPORT"

              echo "<details>" >> "$REPORT"
              echo "<summary>Show Bandit report</summary>" >> "$REPORT"
              echo "" >> "$REPORT"

              cat bandit.txt >> "$REPORT"

              echo "" >> "$REPORT"
              echo "</details>" >> "$REPORT"
              echo "" >> "$REPORT"
              echo "##  📏 Pylint" >> "$REPORT"

              pylint . > pylint.txt 2>&1 || true

              SCORE=$(grep "Your code has been rated at" pylint.txt | awk '{print $7}')

              echo "" >> "$REPORT"
              echo "**Global score:** ${SCORE:-Unknown}" >> "$REPORT"
              echo "" >> "$REPORT"

              echo "<details>" >> "$REPORT"
              echo "<summary>Show Pylint report</summary>" >> "$REPORT"
              echo "" >> "$REPORT"

              cat pylint.txt >> "$REPORT"

              echo "" >> "$REPORT"
              echo "</details>" >> "$REPORT"
              echo "" >> "$REPORT"
              echo "## 📈 Coverage" >> "$REPORT"

              pytest --cov=. --cov-report=term > coverage.txt 2>&1 || true

              COVERAGE=$(grep TOTAL coverage.txt | awk '{print $NF}')

              echo "" >> "$REPORT"
              echo "**Coverage:** ${COVERAGE:-0%}" >> "$REPORT"

              echo "" >> "$REPORT"

              echo "<details>" >> "$REPORT"
              echo "<summary>Show coverage report</summary>" >> "$REPORT"
              echo "" >> "$REPORT"

              cat coverage.txt >> "$REPORT"

              echo "" >> "$REPORT"
              echo "</details>">> "$REPORT"


      # Tests
      - name: Run tests
        continue-on-error: true
        run: |
              pytest -v --tb=short > pytest.txt 2>&1 || true
              echo "## 🧪 Pytest" >> "$REPORT"
              echo "" >> "$REPORT"
              echo "===== PYTEST OUTPUT ====="
              cat pytest.txt
              echo "========================="

              echo "===== REPORT AFTER WRITE ====="
              tail -n 20 "$REPORT"
              echo "=============================="

               

               
               if grep -q "collected 0 items" pytest.txt; then
                  echo "⚠️ Aucun test trouvé." >> "$REPORT"
               else
               PASSED=$(grep -c " PASSED" pytest.txt || true)
               FAILED=$(grep -c " FAILED" pytest.txt || true)
               SKIPPED=$(grep -c " SKIPPED" pytest.txt || true)
               ERRORS=$(grep -c " ERROR" pytest.txt || true)

               TOTAL=$((PASSED + FAILED + SKIPPED + ERRORS))

               echo "" >> "$REPORT"
               echo "| Result | Count |" >> "$REPORT"
               echo "|--------|------:|" >> "$REPORT"
               echo "| ✅ Passed | $PASSED |" >> "$REPORT"
               echo "| ❌ Failed | $FAILED |" >> "$REPORT"
               echo "| ⚠️ Errors | $ERRORS |" >> "$REPORT"
               echo "| ⏭️ Skipped | $SKIPPED |" >> "$REPORT"
               echo "| **Total** | **$TOTAL** |" >> "$REPORT"

               echo "" >> "$REPORT"

               echo "### 📂 Failed tests" >> "$REPORT"
               echo "" >> "$REPORT"

               if [ "$FAILED" -gt 0 ]; then

               grep " FAILED" pytest.txt \
               | sed 's/^/ - /' \
               >> "$REPORT"

               else

                 echo "✅ No failed tests." >> "$REPORT"

               fi

               echo "" >> "$REPORT"

               echo "<details>" >> "$REPORT"
               echo "<summary>Show full pytest output</summary>" >> "$REPORT"
               echo "" >> "$REPORT"

               cat pytest.txt >> "$REPORT"

               echo "" >> "$REPORT"
               echo "</details>" >> "$REPORT"

              

               fi
      

      




      - name: Generate dashboard
        run: |
          mkdir -p dashboard
          python -m scripts.generate_dashboard
      # Affichage GitHub

      - name: Display report

        run: |

          cat "$REPORT" >> $GITHUB_STEP_SUMMARY



      


      # Sauvegarde artifact

      - name: Upload report

        uses: actions/upload-artifact@v4

        with:

          name: python-report

          path: |
             reports/**
             database/**
             dashboard/**
      - name: Commit reports
        uses: ./.github/actions/commit-reports
        with:
           report-type: python
           commit-message: "Python CI Report #${{ github.run_number }}"
