name: Python CI Report

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - "**"

  workflow_dispatch:

  schedule:
    # Toutes les heures
    - cron: "0 * * * *"

permissions:
  contents: write
jobs:

  python-check:

    name: Python Tests & Report
    runs-on: ubuntu-latest


    steps:
      # Récupération du code
      - name: Checkout repository
        uses: actions/checkout@v4


      # Installation Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"


      # Installation des outils
      - name: Install dependencies
        run: |

          python -m pip install --upgrade pip

          pip install pytest black flake8 radon pylint bandit pytest-cov interrogate


          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi



      # Création du fichier rapport
      - name: Create report
        run: |

          echo "# Rapport Python - The Last Signal" > python-report.md

          echo "" >> python-report.md

          echo "Date : $(date)" >> python-report.md

          echo "" >> python-report.md



      # Vérification du formatage
      - name: Check formatting
        continue-on-error: true
        run: |

          echo "## Black" >> python-report.md

          black --check . >> python-report.md 2>&1



      # Analyse du code
      - name: Code analysis
        continue-on-error: true
        run: |

          echo "## Flake8" >> python-report.md

          flake8 . >> python-report.md 2>&1
      - name: Quality analysis
        continue-on-error: true
        run: |

          echo "## Quality Analysis" >> reports/python-report.md

          echo "### Complexity" >> reports/python-report.md
          radon cc . -a >> reports/python-report.md


          echo "### Security" >> reports/python-report.md
          bandit -r . >> reports/python-report.md


          echo "### Pylint" >> reports/python-report.md
          pylint . >> reports/python-report.md


          echo "### Coverage" >> reports/python-report.md
          pytest --cov . >> reports/python-report.md



      # Tests
      - name: Run tests
        continue-on-error: true
        run: |

          echo "## Tests Pytest" >> python-report.md


          if [ -d tests ]; then

            pytest >> python-report.md 2>&1

          else

            echo "Aucun dossier tests trouvé" >> python-report.md

          fi


      # Création SQLite

      - name: Generate SQLite database
        run: |

          python <<'PY'

          import sqlite3
          import datetime
          import os


          os.makedirs("database", exist_ok=True)


          db = sqlite3.connect(
              "database/python_reports.db"
          )


          cursor = db.cursor()


          cursor.execute("""
          CREATE TABLE IF NOT EXISTS reports(

              id INTEGER PRIMARY KEY AUTOINCREMENT,

              date TEXT,

              branch TEXT,

              commit_hash TEXT,

              report TEXT

          )
          """)



          with open(
              "reports/python-report.md",
              encoding="utf-8"
          ) as f:

              report = f.read()



          cursor.execute(
              """
              INSERT INTO reports
              (
              date,
              branch,
              commit_hash,
              report
              )

              VALUES (?,?,?,?)

              """,

              (

              str(datetime.datetime.now()),

              os.environ.get(
                  "GITHUB_REF",
                  "unknown"
              ),

              os.environ.get(
                  "GITHUB_SHA",
                  "unknown"
              ),

              report

              )

          )


          db.commit()

          db.close()


          PY



      # Affichage GitHub

      - name: Display report

        run: |

          cat reports/python-report.md >> $GITHUB_STEP_SUMMARY



      # Sauvegarde artifact

      - name: Upload report

        uses: actions/upload-artifact@v4

        with:

          name: python-report-${{ github.run_number }}

          path: |

            reports/python-report-${{ github.run_number }}.md

            database/python_reports-${{ github.run_number }}.db



      # Ajout automatique dans le dépôt

      - name: Commit generated files

        run: |


          git config --global user.name "github-actions"

          git config --global user.email "github-actions@github.com"


          git add reports/python-report.md

          git add database/python_reports.db


          git commit -m "Update Python CI report database" || echo "Nothing to commit"


          git push

      
