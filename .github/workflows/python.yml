name: Python CI Report

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - "**"

  workflow_dispatch:

  schedule:
    # Toutes les heures
    - cron: "0 * * * *"


jobs:

  python-check:

    name: Python Tests & Report
    runs-on: ubuntu-latest


    steps:

      # Récupération du code
      - name: Checkout repository
        uses: actions/checkout@v4


      # Installation Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      # Installation des outils
      - name: Install dependencies
        run: |

          python -m pip install --upgrade pip

          pip install pytest black flake8


          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi



      # Création du fichier rapport
      - name: Create report
        run: |

          echo "# Rapport Python - The Last Signal" > python-report.md

          echo "" >> python-report.md

          echo "Date : $(date)" >> python-report.md

          echo "" >> python-report.md



      # Vérification du formatage
      - name: Check formatting
        continue-on-error: true
        run: |

          echo "## Black" >> python-report.md

          black --check . >> python-report.md 2>&1



      # Analyse du code
      - name: Code analysis
        continue-on-error: true
        run: |

          echo "## Flake8" >> python-report.md

          flake8 . >> python-report.md 2>&1



      # Tests
      - name: Run tests
        continue-on-error: true
        run: |

          echo "## Tests Pytest" >> python-report.md


          if [ -d tests ]; then

            pytest >> python-report.md 2>&1

          else

            echo "Aucun dossier tests trouvé" >> python-report.md

          fi



      # Affichage dans GitHub
      - name: Display report
        run: |

          cat python-report.md >> $GITHUB_STEP_SUMMARY



      # Sauvegarde du rapport
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:

          name: python-report

          path: python-report.md