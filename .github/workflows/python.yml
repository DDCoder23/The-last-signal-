name: Python CI Report

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - "**"

  workflow_dispatch:

  schedule:
    # Toutes les heures
    - cron: "7 * * * *"

permissions:
  contents: write

jobs:

  python-check:

    name: Python Tests & Report
    runs-on: ubuntu-latest


    steps:
      # Récupération du code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
              fetch-depth: 0
              token: ${{ secrets.GITHUB_TOKEN }}
              persist-credentials: true


      # Installation Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"


      # Installation des outils
      - name: Install dependencies
        run: |

          python -m pip install --upgrade pip

          pip install pytest black flake8 radon pylint bandit pytest-cov interrogate


          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi



      # Création du fichier rapport
      - name: Create report
        run: |
          mkdir -p reports
          REPORT="reports/python-report-${GITHUB_RUN_NUMBER}.md"

          echo "REPORT=$REPORT" >> $GITHUB_ENV

          echo "# Rapport Python" > "$REPORT"

          

          echo "" >> "$REPORT"

          echo "Date : $(date)" >> "$REPORT"

          echo "" >> "$REPORT"



      # Vérification du formatage
      - name: Check formatting
        continue-on-error: true
        run: |

          echo "## Black" >> "$REPORT"

          black --check . >> "$REPORT" 2>&1



      # Analyse du code
      - name: Code analysis
        continue-on-error: true
        run: |

          echo "## Flake8" >> "$REPORT"

          echo "| Fichier | Ligne | Colonne | Code | Message |" >> "$REPORT"
          echo "|---------|------:|--------:|------|---------|" >> "$REPORT"
          flake8 . > flake8.txt 2>&1 || true
          
          awk -F: '{
             printf("| %s | %s | %s | %s |", $1, $2, $3, $4)
             for (i = 5; i <= NF; i++) {
             printf("%s%s", $i, (i == NF ? "" : ":"))
             }
            printf(" |\n")
            } ' flake8.txt >> "$REPORT"
      - name: Quality analysis
        continue-on-error: true
        run: |

          echo "## Quality Analysis" >> "$REPORT"

          echo "### Complexity" >> "$REPORT"
          radon cc . -a >> "$REPORT"


          echo "### Security" >> "$REPORT"
          bandit -r . >> "$REPORT"


          echo "### Pylint" >> "$REPORT"
          pylint . >> "$REPORT"


          echo "### Coverage" >> "$REPORT"
          pytest --cov . >> "$REPORT"


      # Tests
      - name: Run tests
        continue-on-error: true
        run: |

          echo "## Tests Pytest" >> "$REPORT"


          if [ -d tests ]; then

            pytest >> "$REPORT" 2>&1

          else

            echo "Aucun dossier tests trouvé" >> "$REPORT"

          fi
      

      




      - name: Generate dashboard
        run: |
          mkdir -p dashboard
          python -m scripts.generate_dashboard
      # Affichage GitHub

      - name: Display report

        run: |

          cat "$REPORT" >> $GITHUB_STEP_SUMMARY



      


      # Sauvegarde artifact

      - name: Upload report

        uses: actions/upload-artifact@v4

        with:

          name: python-report

          path: |
             reports/**
             database/**
             dashboard/**
      - name: Commit reports
        uses: ./.github/actions/commit-reports
        with:
           report-type: python
           commit-message: "Python CI Report #${{ github.run_number }}"
