name: Build CI Report

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - "**"

  workflow_dispatch:

  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

jobs:

  build:

    name: Build (${{ matrix.os }})

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create report
        shell: bash
        run: |
          mkdir -p reports

          REPORT="reports/build-${{ matrix.os }}-${GITHUB_RUN_NUMBER}.md"

          echo "REPORT=$REPORT" >> $GITHUB_ENV

          {
            echo "# Build Report"
            echo ""
            echo "Run : ${GITHUB_RUN_NUMBER}"
            echo "OS : ${{ matrix.os }}"
            echo "Branch : ${GITHUB_REF_NAME}"
            echo "Commit : ${GITHUB_SHA}"
            echo "Date : $(date)"
            echo ""
          } > "$REPORT"

      - name: Python build
        continue-on-error: true
        shell: bash
        run: |
          {
            echo ""
            echo "## Python"
          } >> "$REPORT"

          python -m compileall . >> "$REPORT" 2>&1

      - name: Rust build
        continue-on-error: true
        shell: bash
        run: |
          {
            echo ""
            echo "## Rust"
          } >> "$REPORT"

          if find . -name Cargo.toml | grep -q .; then
            cargo build --workspace --release >> "$REPORT" 2>&1
          else
            echo "No Rust project found." >> "$REPORT"
          fi

      - name: Godot build
        continue-on-error: true
        shell: bash
        run: |
          {
            echo ""
            echo "## Godot"
          } >> "$REPORT"

          if [ -f project.godot ]; then
            echo "Godot export not configured yet." >> "$REPORT"
          else
            echo "No Godot project found." >> "$REPORT"
          fi

      - name: Build Summary
        shell: bash
        run: |
          {
            echo ""
            echo "## Summary"
            echo ""
            echo "- Python build completed"
            echo "- Rust build completed"
            echo "- Godot build completed"
          } >> "$REPORT"

      - name: Publish Summary
        shell: bash
        run: |
          cat "$REPORT" >> $GITHUB_STEP_SUMMARY

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: build-report-${{ matrix.os }}
          path: |
            reports/**
            database/**
            dashboard/**

      - name: Commit reports
        uses: ./.github/actions/commit-reports
        with:
          report-type: build
          commit-message: "Build Report #${{ github.run_number }}"
