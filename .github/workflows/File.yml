name: Create Documentation Structure

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create documentation files
        run: |
          mkdir -p docs/gdd
          files=(
            "01_VISION.md"
            "02_UNIVERS.md"
            "03_SCENARIO.md"
            "04_CHRONOLOGIE.md"
            "05_FACTIONS.md"
            "06_REGIONS.md"
            "07_VILLES.md"
            "08_DONJONS.md"
            "09_PERSONNAGES.md"
            "10_CREATION_PERSONNAGE.md"
            "11_PROGRESSION.md"
            "12_STATISTIQUES.md"
            "13_COMPETENCES.md"
            "14_CLASSES.md"
            "15_GAMEPLAY.md"
            "16_COMBAT.md"
            "17_IA.md"
            "18_MONSTRES.md"
            "19_BOSS.md"
            "20_INVENTAIRE.md"
            "21_EQUIPEMENT.md"
            "22_OBJETS.md"
            "23_BANQUE.md"
            "24_COFFRES.md"
            "25_ECONOMIE.md"
            "26_COMMERCE.md"
            "27_HOTEL_DES_VENTES.md"
            "28_MONNAIES.md"
            "29_METIERS.md"
            "30_CRAFT.md"
            "31_RECOLTE.md"
            "32_CARTE.md"
            "33_BIOMES.md"
            "34_METEO.md"
            "35_JOUR_NUIT.md"
            "36_GUILDES.md"
            "37_GROUPES.md"
            "38_CHAT.md"
            "39_PVE.md"
            "40_PVP.md"
            "41_QUETES.md"
            "42_EVENEMENTS.md"
            "43_SUCCES.md"
            "44_HUD.md"
            "45_MENUS.md"
            "46_ACCESSIBILITE.md"
            "47_MUSIQUES.md"
            "48_AMBIANCES.md"
            "49_EFFETS_SONORES.md"
            "50_DIRECTION_ARTISTIQUE.md"
            "51_CONCEPT_ART.md"
            "52_MODELES_3D.md"
            "53_ANIMATIONS.md"
            "54_EXTENSIONS.md"
            "55_IDEES.md"
          )

          for file in "${files[@]}"; do
            if [ ! -f "$file" ]; then
              path="docs/gdd/$file"
              touch "$path"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "Aucune modification."
            exit 0
          fi

          git commit -m "docs: create documentation structure"
          git push
