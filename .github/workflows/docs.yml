name: Documentation Quality

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - "**"

  workflow_dispatch:

permissions:
  contents: write

env:
  DOC_SCORE_MINIMUM: 60

jobs:

  documentation-check:

    name: 📚 Documentation Quality
    runs-on: ubuntu-latest
    steps:

      # =========================
      # Checkout
      # =========================

      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # =========================
      # Node.js
      # =========================

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install Node tools
        run: |
          npm install -g markdownlint-cli2
          npm install -g cspell

      # =========================
      # Python
      # =========================

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install interrogate markdown pyyaml

      # =========================
      # Rust
      # =========================

      - name: 🦀 Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        continue-on-error: true
              # =========================
      # Markdown
      # =========================

      - name: 📑 Check Markdown
        continue-on-error: true
        run: |
           mkdir -p reports/docs
           markdownlint-cli2 \
           "**/*.md" --json \
           > reports/docs/markdownlint.json
      # =========================
      # Spelling
      # =========================

      - name: ✍️ Check spelling
        continue-on-error: true
        run: |
          mkdir -p reports/docs
          
          cspell "**/*.md" \
          --language-id markdown \
          --no-progress \
          --no-summary \
          --output-format json \
          > reports/docs/cspell.txt 2>&1

      # =========================
      # Links
      # =========================

      - name: 🔗 Check links
        continue-on-error: true
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            **/*.md

      # =========================
      # Python documentation
      # =========================

      - name: 🐍 Generate Python documentation report
        continue-on-error: true
        run: |
          mkdir -p reports/docs

          interrogate . \
            -o markdown \
            -f reports/docs/python-docs.md

      # =========================
      # Rust documentation
      # =========================

      - name: 🦀 Generate Rust documentation
        continue-on-error: true
        run: |
          if [ -f Cargo.toml ]; then
            cargo doc --no-deps
          fi
                # =========================
      # Documentation score
      # =========================

      - name: 📊 Calculate documentation score
        run: |
          
          python scripts/transformateur.py
          mkdir -p reports/docs

          python scripts/docs_score.py

      # =========================
      # Display score
      # =========================

      - name: 📋 Show documentation score
        run: |

          echo "Documentation score :"

          cat reports/docs/score.txt

          echo ""

          cat reports/docs/score.md

      # =========================
      # Verify score
      # =========================

      - name: 🚨 Verify documentation quality
        run: |

          SCORE=$(cat reports/docs/score.txt)

          echo "Documentation score : $SCORE/100"

          if [ "$SCORE" -lt "$DOC_SCORE_MINIMUM" ]; then

            echo ""
            echo "========================================"
            echo "❌ DOCUMENTATION QUALITY FAILED"
            echo "========================================"
            echo ""
            echo "Obtained score : $SCORE/100"
            echo "Minimum score : $DOC_SCORE_MINIMUM/100"
            echo ""
            echo "See reports/docs/problems.md"
            echo ""

            exit 1

          fi

          echo ""
          echo "========================================"
          echo "✅ DOCUMENTATION QUALITY PASSED"
          echo "========================================"
          echo ""
          echo "Score : $SCORE/100"

      # =========================
      # GitHub Step Summary
      # =========================

      - name: 📝 Publish summary
        if: always()
        run: |
          mkdir -p reports/docs
          {
            echo "# 📚 Documentation Quality"
            echo ""
            echo "Score : $(cat reports/docs/score.txt)/100"
            echo ""
            echo "## Details"
            echo ""
            cat reports/docs/score.md
          } >> $GITHUB_STEP_SUMMARY
          python -m scripts.generate_problems_md.py
                # =========================
      # Dashboard
      # =========================

      - name: 📈 Generate dashboard
        if: always()
        run: |

          mkdir -p dashboard

          python scripts/generate_dashboard.py

      # =========================
      # Upload reports
      # =========================

      - name: 📦 Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: documentation-report-${{ github.run_number }}
          retention-days: 30
          path: |
            reports/**
            dashboard/**

      # =========================
      # Commit reports
      # =========================

      - name: 💾 Commit reports
        if: always()
        uses: ./.github/actions/commit-reports
        with:
          report-type: docs
          commit-message: "Documentation Report #${{ github.run_number }}"
