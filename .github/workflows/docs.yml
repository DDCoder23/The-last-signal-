name: Documentation Quality

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - "**"

  workflow_dispatch:


permissions:
  contents: write


env:
  DOC_SCORE_MINIMUM: 80


jobs:

  documentation-check:

    name: 📚 Documentation Quality Check
    runs-on: ubuntu-latest


    steps:

      # =========================
      # Checkout
      # =========================

      - name: 📥 Checkout repository
        uses: actions/checkout@v4


      # =========================
      # Node tools
      # =========================

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22


      - name: Install Markdown tools
        run: |
          npm install -g markdownlint-cli2
          npm install -g cspell


      # =========================
      # Python
      # =========================

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"


      - name: Install Python tools
        run: |
          pip install interrogate
          pip install markdown
          pip install pyyaml


      # =========================
      # Rust
      # =========================

         
      - name: 🦀 Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        continue-on-error: true


      # =========================
      # Markdown
      # =========================

      - name: 📑 Check Markdown structure
        continue-on-error: true
        run: |

          markdownlint-cli2 "**/*.md"



      # =========================
      # Spell checking
      # =========================

      - name: ✍️ Check spelling FR + EN
        continue-on-error: true
        run: |

          cspell "**/*.md" \
          --language-id markdown



      # =========================
      # Links
      # =========================

      - name: 🔗 Check broken links
        continue-on-error: true
        uses: lycheeverse/lychee-action@v2
        with:

          args: |
            "**/*.md"



      # =========================
      # Python documentation
      # =========================

      - name: 📚 Python documentation coverage
        continue-on-error: true
        run: |

          mkdir -p reports/docs

          interrogate . \
          -o markdown \
          -f reports/docs/python-docs.md



      # =========================
      # Rust documentation
      # =========================

      - name: 🦀 Generate Rust documentation
        continue-on-error: true
        run: |

          if [ -f Cargo.toml ]; then
              cargo doc --no-deps
          fi



      # =========================
      # Generate score
      # =========================

      - name: 📊 Calculate documentation score
        run: |

          mkdir -p reports/docs

          python scripts/docs_score.py



      # =========================
      # Check score
      # =========================

      - name: 🚨 Verify documentation score
        id: score_check
        run: |

          SCORE=$(cat reports/docs/score.txt)

          echo "Documentation score: $SCORE%"


          if [ "$SCORE" -lt "$DOC_SCORE_MINIMUM" ]; then

            echo ""
            echo "======================================"
            echo "❌ DOCUMENTATION QUALITY FAILED"
            echo "======================================"
            echo ""
            echo "Score obtenu : $SCORE%"
            echo "Score minimum requis : $DOC_SCORE_MINIMUM%"
            echo ""
            echo "Corrige les problèmes de documentation"
            echo "avant de fusionner cette modification."
            echo ""

            exit 1

          else

            echo ""
            echo "======================================"
            echo "✅ DOCUMENTATION QUALITY PASSED"
            echo "======================================"
            echo ""
            echo "Score : $SCORE%"

          fi



      # =========================
      # Dashboard
      # =========================
      - name: 📄 Generate final report
        if: always()
        run: |

          mkdir -p reports/docs

          pourcentagemin=${DOC_SCORE_MINIMUM}
          commit=${GITHUB_SHA}
          auteur=${GITHUB_ACTOR}

          doc=$(cat reports/docs/score.txt 2>/dev/null || echo 0)

          if [ "$doc" -ge "$pourcentagemin" ]; then
              status="PASS ✅"
          else
              status="FAIL ❌"
          fi


          printf "# 📚 Documentation Quality Report\n\n" > docs/reports/report.md
          printf "## Commit\n\n%s\n\n" "$commit" >> docs/reports/report.md
          printf "## Author\n\n%s\n\n" "$auteur" >> docs/reports/report.md
          printf "## Minimum score required\n\n%s%%\n\n" "$pourcentagemin" >> docs/reports/report.md
          printf "## Obtained score\n\n%s%%\n\n" "$doc" >> docs/reports/report.md
          printf "## Status\n\n%s\n\n" "$status" >> docs/reports/report.md
          printf "Generated automatically by GitHub Actions.\n" >> docs/reports/report.md
      - name: 📈 Generate dashboard
        if: success()
        run: |

          python scripts/docs_dashboard.py



    
      
          



      # =========================
      # Upload reports
      # =========================

      - name: Upload report

        uses: actions/upload-artifact@v4

        with:

          name: documentation-report

          path: |
             reports/**
             

      # =========================
      # Commit reports
      # =========================

      - name: Commit reports
        if: always()
        uses: ./.github/actions/commit-reports
        with:
           report-type: docs
           commit-message: "Docs CI Report #${{ github.run_number }}"
