name: Rust CI Report

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - "**"

  workflow_dispatch:

  schedule:
    - cron: "7 * * * *"

permissions:
  contents: write

jobs:
  rust-check:
    name: Rust Tests & Report
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Create report directory
        run: |
          mkdir -p reports/rust

      - name: Generate Rust report
        shell: bash
        run: |

          REPORT=reports/rust/rust-report.md

          echo "# Rust CI Report" > $REPORT
          echo "" >> $REPORT
          echo "Date: $(date)" >> $REPORT
          echo "Branch: $GITHUB_REF_NAME" >> $REPORT
          echo "Commit: $GITHUB_SHA" >> $REPORT
          echo "" >> $REPORT

          if ! find . -name Cargo.toml | grep -q . ; then

            echo "No Rust project found." >> $REPORT

            echo "" >> $REPORT
            echo "Clippy warnings: 0" >> $REPORT
            echo "Passed tests: 0" >> $REPORT
            echo "Failed tests: 0" >> $REPORT
            echo "Coverage: 0" >> $REPORT
            echo "Cargo fmt: 0" >> $REPORT
            echo "Cargo audit: 0" >> $REPORT

            exit 0

          fi

          ####################################
          # Cargo fmt
          ####################################

          echo "## Cargo fmt" >> $REPORT

          cargo fmt --all --check \
            >> $REPORT 2>&1 || true

          if cargo fmt --all --check >/dev/null 2>&1
          then
              echo "Cargo fmt: 0" >> $REPORT
          else
              echo "Cargo fmt: 1" >> $REPORT
          fi

          echo "" >> $REPORT

          ####################################
          # Clippy
          ####################################

          echo "## Cargo clippy" >> $REPORT

          cargo clippy \
            --all-targets \
            --all-features \
            > clippy.log 2>&1 || true

          cat clippy.log >> $REPORT

          WARNINGS=$(grep -c "warning:" clippy.log || true)

          echo "" >> $REPORT
          echo "Clippy warnings: $WARNINGS" >> $REPORT

          ####################################
          # Tests
          ####################################

          echo "" >> $REPORT
          echo "## Cargo test" >> $REPORT

          cargo test \
            > tests.log 2>&1 || true

          cat tests.log >> $REPORT

          PASSED=$(grep -c " ... ok" tests.log || true)
          FAILED=$(grep -c " ... FAILED" tests.log || true)

          echo "" >> $REPORT
          echo "Passed tests: $PASSED" >> $REPORT
          echo "Failed tests: $FAILED" >> $REPORT

          ####################################
          # Build
          ####################################

          echo "" >> $REPORT
          echo "## Cargo build" >> $REPORT

          cargo build --release \
            >> $REPORT 2>&1 || true

          ####################################
          # Coverage
          ####################################

          echo "" >> $REPORT

          echo "Coverage: 0" >> $REPORT

          ####################################
          # Cargo audit
          ####################################

          cargo install cargo-audit --locked >/dev/null 2>&1 || true

          echo "" >> $REPORT
          echo "## Cargo audit" >> $REPORT

          cargo audit \
            > audit.log 2>&1 || true

          cat audit.log >> $REPORT

          ADVISORIES=$(grep -c "Crate:" audit.log || true)

          echo "" >> $REPORT
          echo "Cargo audit: $ADVISORIES" >> $REPORT

      - name: Publish summary
        run: cat reports/rust/rust-report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: rust-report
          path: |
            reports/**
            database/**
            dashboard/**

      - name: Commit reports
        uses: ./.github/actions/commit-reports
        with:
          report-type: rust
          commit-message: "Rust CI Report #${{ github.run_number }}"
