
<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>
The Last Signal - CI Dashboard
</title>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<style>

body {
    font-family: Arial;
    margin: 40px;
    background:#111;
    color:white;
}

.card {

    background:#222;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;

}


table {

width:100%;
border-collapse:collapse;

}

td,th {

padding:10px;
border-bottom:1px solid #555;

}

</style>


</head>


<body>


<h1>
🚀 The Last Signal - CI Dashboard
</h1>


<div class="card">

<h2>
Evolution couverture des tests
</h2>


<canvas id="coverage"></canvas>

</div>



<div class="card">

<h2>
Evolution Pylint
</h2>


<canvas id="pylint"></canvas>

</div>




<div class="card">

<h2>
Historique des builds
</h2>


<table>

<tr>
<th>Run</th>
<th>Date</th>
<th>Branche</th>
<th>Coverage</th>
<th>Pylint</th>
</tr>



            <tr>
                <td>47</td>
                <td>2026-07-10 13:46:28.956230</td>
                <td>refs/heads/main</td>
                <td>0%</td>
                <td>0/10</td>
            </tr>
            


</table>


</div>



<script>


new Chart(
document.getElementById('coverage'),
{

type:'line',

data:{
labels:["47"],

datasets:[{

label:'Coverage %',

data:[0]

}]

}

}



);



new Chart(

document.getElementById('pylint'),

{

type:'line',

data:{

labels:["47"],

datasets:[{

label:'Pylint /10',

data:0.0

}]

}

}

);



</script>


</body>

</html>
